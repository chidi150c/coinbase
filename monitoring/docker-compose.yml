services:
  bridge_binance:
    image: ghcr.io/${GHCR_NS:-chidi150c}/coinbase-bridge-binance:${IMAGE_SHA:-latest}
    container_name: bridge_binance
    env_file:
      - /opt/coinbase/env/binance.env
    ports:
      - "8789:8789"
    networks:
      - monitoring_network
    restart: unless-stopped

  bot_binance:
    depends_on: [bridge_binance]
    image: ghcr.io/${GHCR_NS:-chidi150c}/coinbase-bot:${IMAGE_SHA:-latest}
    command: ["-live", "-interval", "1"]
    environment:
      - BOT_ENV_PATH=/opt/coinbase/env/bot_binance.env
    volumes:
      - /opt/coinbase/env:/opt/coinbase/env:ro
      - /opt/coinbase/state:/opt/coinbase/state
    env_file:
      - /opt/coinbase/env/bot_binance.env
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["NONE"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      monitoring_network:
        aliases: [bot-binance]

  alertmanager:
    image: prom/alertmanager:latest
    ports: ["9093:9093"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks: [monitoring_network]

volumes:
  coinbase_state:

networks:
  monitoring_network:
    driver: bridge